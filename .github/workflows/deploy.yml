name: Build and Deploy Basalt Site

on:
  workflow_dispatch:
    inputs:
      vault_repo:
        description: "Vault repository (owner/repo)"
        required: true
        type: string
      vault_directory:
        description: "Directory within vault repo containing markdown files (e.g. vault/)"
        required: true
        default: "vault/"
        type: string
      output_directory:
        description: "Directory to commit built output to in vault repo (e.g. output/)"
        required: true
        default: "output/"
        type: string
      site_name:
        description: "Site name shown in header and titles"
        required: false
        default: "Basalt"
        type: string
      site_theme:
        description: "Default theme: dark or light"
        required: false
        default: "dark"
        type: string
      ignored_dirs:
        description: "Comma-separated list of directory names to ignore"
        required: false
        default: ""
        type: string

  workflow_call:
    inputs:
      vault_repo:
        description: "Vault repository (owner/repo)"
        required: true
        type: string
      vault_directory:
        description: "Directory within vault repo containing markdown files"
        required: true
        type: string
      output_directory:
        description: "Directory to commit built output to"
        required: true
        type: string
      site_name:
        description: "Site name shown in header and titles"
        required: false
        default: "Basalt"
        type: string
      site_theme:
        description: "Default theme: dark or light"
        required: false
        default: "dark"
        type: string
      ignored_dirs:
        description: "Comma-separated list of directory names to ignore"
        required: false
        default: ""
        type: string

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: Checkout basalt repo (source only)
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.BASALT_REPO || 'gravityctl/basalt' }}
          path: basalt
          sparse-checkout: |
            src/
            go.mod
            go.sum
            .env.example
          sparse-checkout-cone-mode: false

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true
          cache-dependency-path: basalt/go.sum

      - name: Build basalt binary
        run: |
          cd basalt/src
          CGO_ENABLED=0 go build -buildvcs=false -o basalt .

      - name: Checkout vault repo
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.vault_repo }}
          path: workspace
          ref: main
          sparse-checkout: |
            ${{ inputs.vault_directory }}
          sparse-checkout-cone-mode: false

      - name: Prepare vault layout for basalt
        run: |
          cp -r "workspace/${{ inputs.vault_directory }}" basalt/vault

      - name: Build site
        run: |
          cd basalt
          ./src/basalt
        env:
          BASALT_SITE_NAME: ${{ inputs.site_name }}
          BASALT_SITE_THEME: ${{ inputs.site_theme }}
          BASALT_IGNORED_DIRS: ${{ inputs.ignored_dirs }}
          BASALT_INPUT: vault
          BASALT_OUTPUT: output

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: basalt/output

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
